services:
  bigcalendar:
    build:
      context: .
    command: daphne -b 0.0.0.0 -p 8000 bigCalendar_app.asgi:application
    volumes:
      - /opt/bigCalendar/staticfiles:/app/staticfiles
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    depends_on:
      - mysql
      - redis
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    ports:
      - "127.0.0.1:3306:3306"
    environment:
      MYSQL_DATABASE: bigcalendar
      MYSQL_USER: bigcalendar
      MYSQL_PASSWORD: change_me
      MYSQL_ROOT_PASSWORD: root_me
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

volumes:
  mysql_data:
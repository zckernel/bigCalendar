{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Room Calendar</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { overflow: hidden; overscroll-behavior: none; background: #f0f0f0; font-family: monospace; }
    #wrapper {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      cursor: grab;
      touch-action: none;
    }
    #wrapper.grabbing { cursor: grabbing; }
    #canvas, #drag-canvas {
      position: absolute;
      top: 0;
      left: 0;
      display: block;
    }
    #drag-canvas { pointer-events: none; }
    #vscroll {
      position: absolute;
      top: 0;
      right: 0;
      width: 12px;
      height: 100vh;
      overflow-y: scroll;
      z-index: 10;
    }
    #vscroll-inner { width: 1px; }
    #type-popup {
      display: none;
      position: fixed;
      z-index: 100;
      background: #fff;
      border: 1px solid #bbb;
      border-radius: 6px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.18);
      padding: 6px;
      gap: 4px;
      flex-direction: column;
      min-width: 140px;
    }
    #type-popup.visible { display: flex; }
    #type-popup button {
      border: none;
      border-radius: 4px;
      padding: 7px 12px;
      font: bold 11px monospace;
      cursor: pointer;
      text-align: left;
      transition: opacity .15s;
    }
    #type-popup button:hover { opacity: .8; }
    #type-popup .btn-booked      { background: #1E88E5; color: #fff; }
    #type-popup .btn-maintenance { background: #E53935; color: #fff; }
    #type-popup .btn-empty       { background: #FDD835; color: #333; }
  </style>
</head>
<body>
<div id="wrapper">
  <canvas id="canvas"></canvas>
  <canvas id="drag-canvas"></canvas>
  <div id="vscroll"><div id="vscroll-inner"></div></div>
</div>
<div id="type-popup">
  <button class="btn-booked">Booked</button>
  <button class="btn-maintenance">Maintenance</button>
  <button class="btn-empty">Empty</button>
</div>
<script>window.REALTIME_TRANSPORT = '{{ realtime_transport }}';</script>
<script type="module" src="{% static 'bigCalendar/js/main.js' %}?v=1.0.8"></script>
</body>
</html>
